# Talksasa Cloud — reverse proxy / nginx upload limits
# Include inside the server { } block that serves the Laravel app.
#
# 413 Content Too Large on container file uploads usually means this limit
# is lower than the zip/archive you are uploading.

client_max_body_size 100M;

# PHP-FPM (adjust pool path for your distro):
#   php_admin_value[upload_max_filesize] = 100M
#   php_admin_value[post_max_size] = 100M
#
# Or in php.ini:
#   upload_max_filesize = 100M
#   post_max_size = 100M
#
# Match CONTAINER_UPLOAD_MAX_MB in .env (default 100).
